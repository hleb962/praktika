<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TastyKitchen — агрегатор рецептов</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23E67E22'/%3E%3Ccircle cx='50' cy='45' r='28' fill='%23FFFFFF' opacity='0.9'/%3E%3Cpath d='M35 35 L45 35 L45 55 L35 55 Z' fill='%23E67E22'/%3E%3Cpath d='M55 35 L65 35 L65 55 L55 55 Z' fill='%23E67E22'/%3E%3Cpath d='M42 30 L58 30 L50 20 Z' fill='%23E67E22'/%3E%3Ccircle cx='50' cy='42' r='6' fill='%23E67E22'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23E67E22'/%3E%3Ccircle cx='90' cy='80' r='50' fill='%23FFFFFF' opacity='0.9'/%3E%3Cpath d='M60 65 L80 65 L80 95 L60 95 Z' fill='%23E67E22'/%3E%3Cpath d='M100 65 L120 65 L120 95 L100 95 Z' fill='%23E67E22'/%3E%3Cpath d='M75 55 L105 55 L90 40 Z' fill='%23E67E22'/%3E%3Ccircle cx='90' cy='78' r='10' fill='%23E67E22'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #F8F4F0;
      --card-bg: #FFFFFF;
      --text: #2D1B0E;
      --text-secondary: #6B5340;
      --border: #E8DDD4;
      --accent: #E67E22;
      --accent-light: #F39C12;
      --shadow: rgba(0,0,0,0.08);
      --radius: 20px;
      --transition: 0.3s cubic-bezier(.4,0,.2,1);
      --font: 'Nunito Sans', system-ui, -apple-system, sans-serif;
      --modal-overlay: rgba(0,0,0,0.5);
    }

    [data-theme="dark"] {
      --bg: #1A1410;
      --card-bg: #2A221C;
      --text: #F0E6D8;
      --text-secondary: #A89080;
      --border: #3D3228;
      --shadow: rgba(0,0,0,0.4);
      --modal-overlay: rgba(0,0,0,0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      transition: background var(--transition), color var(--transition);
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--accent); text-decoration: none; }
    img { max-width: 100%; display: block; }

    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0 20px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 16px;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--text); }
    .header-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .search-box {
      display: flex;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 4px 16px;
      align-items: center;
      transition: var(--transition);
    }
    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(230,126,34,0.2);
    }
    .search-box input {
      border: none;
      background: transparent;
      padding: 10px 0;
      font-size: 0.95rem;
      width: 160px;
      color: var(--text);
      outline: none;
    }
    .search-box input::placeholder { color: var(--text-secondary); }
    .search-box button {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px;
    }

    .btn {
      background: var(--bg);
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text);
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--accent-light);
      transform: scale(0.97);
    }
    .btn-outline {
      border-color: var(--border);
      background: transparent;
    }
    .btn-outline:hover {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .btn-success {
      background: #2ECC8A;
      color: #fff;
    }
    .btn-success:hover {
      background: #27AE60;
      transform: scale(0.97);
    }
    .theme-toggle {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: var(--transition);
    }
    .theme-toggle:hover { border-color: var(--accent); }
    .user-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--text);
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .user-btn:hover { border-color: var(--accent); }
    .user-btn .avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .banner {
      background: linear-gradient(135deg, #E67E22, #F39C12);
      border-radius: var(--radius);
      padding: 20px 28px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      color: #fff;
      box-shadow: 0 4px 20px rgba(230,126,34,0.3);
    }
    .banner h2 { font-size: 1.3rem; font-weight: 700; }
    .banner p { opacity: 0.9; font-size: 0.95rem; }
    .banner .btn-banner {
      background: #fff;
      color: #E67E22;
      border: none;
      padding: 10px 28px;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      font-size: 0.95rem;
    }
    .banner .btn-banner:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .filter-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 20px;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: var(--transition);
    }
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .filter-btn:hover { border-color: var(--accent); }
    .add-recipe-btn {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .add-recipe-btn:hover {
      background: var(--accent-light);
      transform: scale(1.02);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      flex: 1;
    }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 4px 16px var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      animation: fadeUp 0.5s ease forwards;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px var(--shadow);
    }
    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      background: #e0d6cc;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
      cursor: pointer;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }
    .card:hover .card-img img { transform: scale(1.02); }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .tag {
      background: var(--bg);
      color: var(--text-secondary);
      font-size: 0.7rem;
      padding: 2px 10px;
      border-radius: 40px;
      border: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .card-title .author {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--text-secondary);
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .card-meta span { display: flex; align-items: center; gap: 4px; }
    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      flex-wrap: wrap;
    }
    .card-actions .btn { padding: 8px 12px; font-size: 0.8rem; }
    .btn-fav.active {
      background: #E85454;
      color: #fff;
      border-color: #E85454;
    }
    .btn-detail {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      flex: 1;
    }
    .btn-detail:hover {
      background: var(--accent);
      color: #fff;
    }
    .btn-delete {
      background: transparent;
      border: 1px solid #E85454;
      color: #E85454;
    }
    .btn-delete:hover {
      background: #E85454;
      color: #fff;
    }

    .planner-widget {
      margin-top: 32px;
      padding: 20px;
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .planner-widget h3 { margin-bottom: 12px; font-size: 1.2rem; }
    .planner-days {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px,1fr));
      gap: 12px;
    }
    .planner-day {
      background: var(--bg);
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      min-height: 80px;
    }
    .planner-day strong {
      display: block;
      font-size: 0.85rem;
      opacity: 0.8;
      margin-bottom: 6px;
    }
    .planner-day .meal {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      background: var(--card-bg);
      padding: 2px 8px 2px 12px;
      border-radius: 20px;
      margin-top: 4px;
      border: 1px solid var(--border);
    }
    .planner-day .meal span { color: var(--accent); font-weight: 600; }
    .planner-day .meal .remove-meal {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1rem;
      padding: 0 4px;
      transition: var(--transition);
    }
    .planner-day .meal .remove-meal:hover {
      color: #E85454;
      transform: scale(1.2);
    }
    .planner-day .empty {
      color: var(--text-secondary);
      font-size: 0.8rem;
      text-align: center;
      padding: 8px 0;
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--modal-overlay);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card-bg);
      border-radius: var(--radius);
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 30px;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: modalIn 0.3s ease;
    }
    .modal-sm { max-width: 450px; }
    @keyframes modalIn {
      0% { opacity: 0; transform: scale(0.95) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 2rem;
      cursor: pointer;
      color: var(--text-secondary);
      background: none;
      border: none;
      transition: var(--transition);
    }
    .modal-close:hover { color: var(--accent); transform: rotate(90deg); }
    .modal h2 { font-size: 1.8rem; margin-bottom: 8px; }
    .modal .subtitle {
      color: var(--text-secondary);
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    .modal .subtitle span { display: flex; align-items: center; gap: 4px; }
    .modal-section { margin-top: 20px; }
    .modal-section h4 {
      font-size: 1.1rem;
      margin-bottom: 8px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 4px;
    }
    .modal-section ul, .modal-section ol {
      padding-left: 24px;
      line-height: 1.6;
    }
    .modal-section li { margin-bottom: 4px; }
    .modal .tags { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }

    .auth-form, .recipe-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 12px;
    }
    .auth-form label, .recipe-form label {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .auth-form input, .recipe-form input, .recipe-form textarea, .recipe-form select {
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      font-family: var(--font);
      transition: var(--transition);
    }
    .auth-form input:focus, .recipe-form input:focus, .recipe-form textarea:focus, .recipe-form select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(230,126,34,0.15);
    }
    .recipe-form textarea { resize: vertical; min-height: 60px; }
    .recipe-form .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .auth-form .btn, .recipe-form .btn {
      justify-content: center;
      padding: 14px;
      font-size: 1rem;
      margin-top: 4px;
    }
    .auth-switch {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 12px;
    }
    .auth-switch a { color: var(--accent); font-weight: 600; cursor: pointer; }
    .auth-switch a:hover { text-decoration: underline; }
    .auth-error, .form-error {
      color: #E85454;
      font-size: 0.85rem;
      text-align: center;
      min-height: 20px;
    }

    .day-picker {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 16px 0;
    }
    .day-picker button {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 10px 18px;
      font-size: 1rem;
      cursor: pointer;
      color: var(--text);
      transition: var(--transition);
      font-weight: 600;
    }
    .day-picker button:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      header { flex-direction: column; align-items: stretch; }
      .search-box input { width: 100%; }
      .grid { grid-template-columns: 1fr; }
      .filters { justify-content: center; }
      .add-recipe-btn { margin-left: 0; width: 100%; justify-content: center; }
      .planner-days { grid-template-columns: 1fr 1fr; }
      .modal { padding: 20px; }
      .banner { flex-direction: column; text-align: center; padding: 16px; }
      .recipe-form .form-row { grid-template-columns: 1fr; }
    }
    @media (min-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }

    .card-img .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: var(--border);
      color: var(--text-secondary);
      font-size: 2rem;
    }
    body.no-scroll { overflow: hidden; }
  </style>
</head>
<body>

<header>
  <div class="logo">Tasty<span>Kitchen</span></div>
  <div class="header-controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Поиск рецептов...">
      <button id="searchBtn">🔍</button>
    </div>
    <button class="theme-toggle" id="themeToggle">🌙 Тёмная</button>
    <button class="user-btn" id="userBtn">
      <span id="userIcon">👤</span>
      <span id="userName">Войти</span>
    </button>
  </div>
</header>

<div class="banner" id="mainBanner">
  <div>
    <h2>🍳 Готовьте с TastyKitchen!</h2>
    <p>Тысячи рецептов, планировщик меню и список покупок — всё в одном месте.</p>
  </div>
  <button class="btn-banner" id="bannerBtn">Начать готовить →</button>
</div>

<div class="filters" id="filterContainer">
  <button class="filter-btn active" data-filter="all">Все</button>
  <button class="filter-btn" data-filter="завтрак">Завтраки</button>
  <button class="filter-btn" data-filter="обед">Обеды</button>
  <button class="filter-btn" data-filter="ужин">Ужины</button>
  <button class="filter-btn" data-filter="десерт">Десерты</button>
  <button class="filter-btn" data-filter="диетическое">Диетическое</button>
  <button class="add-recipe-btn" id="addRecipeBtn">➕ Добавить рецепт</button>
</div>

<div class="grid" id="recipeGrid"></div>

<div class="planner-widget">
  <h3>📅 План на неделю</h3>
  <div class="planner-days" id="plannerDays"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent">
    <button class="modal-close" id="modalClose">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>

<div class="modal-overlay" id="dayPickerOverlay">
  <div class="modal modal-sm">
    <button class="modal-close" id="dayPickerClose">&times;</button>
    <h3 style="text-align:center; margin-bottom: 8px;">📅 Выберите день</h3>
    <p style="text-align:center; color: var(--text-secondary);" id="dayPickerRecipeName"></p>
    <div class="day-picker" id="dayPickerButtons"></div>
  </div>
</div>

<div class="modal-overlay" id="authOverlay">
  <div class="modal modal-sm">
    <button class="modal-close" id="authClose">&times;</button>
    <h2 id="authTitle">Вход</h2>
    <div class="auth-form" id="authForm">
      <div id="authError" class="auth-error"></div>
      <div id="authNameField">
        <label for="authName">Имя</label>
        <input type="text" id="authName" placeholder="Введите имя">
      </div>
      <label for="authPass">Пароль</label>
      <input type="password" id="authPass" placeholder="Введите пароль">
      <button class="btn btn-primary" id="authSubmit">Войти</button>
      <div class="auth-switch" id="authSwitch">
        Нет аккаунта? <a id="authToggleLink">Зарегистрироваться</a>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="recipeModalOverlay">
  <div class="modal">
    <button class="modal-close" id="recipeModalClose">&times;</button>
    <h2 id="recipeModalTitle">➕ Новый рецепт</h2>
    <div id="recipeError" class="form-error"></div>
    <form class="recipe-form" id="recipeForm" onsubmit="return false;">
      <label for="recipeTitle">Название блюда *</label>
      <input type="text" id="recipeTitle" placeholder="Например: Борщ" required>

      <div class="form-row">
        <div>
          <label for="recipeCategory">Категория *</label>
          <select id="recipeCategory">
            <option value="завтрак">Завтрак</option>
            <option value="обед">Обед</option>
            <option value="ужин">Ужин</option>
            <option value="десерт">Десерт</option>
            <option value="диетическое">Диетическое</option>
            <option value="другое">Другое</option>
          </select>
        </div>
        <div>
          <label for="recipeTime">Время (мин) *</label>
          <input type="number" id="recipeTime" placeholder="30" min="1" required>
        </div>
      </div>

      <div class="form-row">
        <div>
          <label for="recipeDifficulty">Сложность</label>
          <select id="recipeDifficulty">
            <option value="легко">Легко</option>
            <option value="средне">Средне</option>
            <option value="сложно">Сложно</option>
          </select>
        </div>
        <div>
          <label for="recipeTags">Теги (через запятую)</label>
          <input type="text" id="recipeTags" placeholder="суп, мясо, обед">
        </div>
      </div>

      <label for="recipeImg">Ссылка на фото (необязательно)</label>
      <input type="url" id="recipeImg" placeholder="https://example.com/photo.jpg">

      <label for="recipeIngredients">Ингредиенты (каждый с новой строки) *</label>
      <textarea id="recipeIngredients" rows="4" placeholder="500 г курицы&#10;2 л воды&#10;1 морковь" required></textarea>

      <label for="recipeSteps">Пошаговое приготовление (каждый шаг с новой строки) *</label>
      <textarea id="recipeSteps" rows="5" placeholder="1. Нарежьте курицу&#10;2. Залейте водой&#10;3. Варите 20 минут" required></textarea>

      <button class="btn btn-success" id="recipeSubmit">✅ Сохранить рецепт</button>
    </form>
  </div>
</div>

<script>
  (function() {
    let currentUser = JSON.parse(localStorage.getItem('tasty_user')) || null;
    const users = JSON.parse(localStorage.getItem('tasty_users')) || [];

    let userRecipes = JSON.parse(localStorage.getItem('tasty_recipes')) || [];

    const defaultRecipes = [
      { id: 1, title: 'Омлет с овощами', category: 'завтрак', time: 15, difficulty: 'легко', tags: ['завтрак', 'овощи'], rating: 4.8, img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTrIHq_VIcNRSnkjCqONzQMqNijTMn0uS2NOo7hD1boaA&s=10', author: 'TastyKitchen', ingredients: ['3 яйца', '50 мл молока', '1 помидор', '1/2 болгарского перца', 'зелень', 'соль, перец'], steps: ['Взбейте яйца с молоком и щепоткой соли.', 'Нарежьте овощи кубиками.', 'Вылейте яичную смесь на разогретую сковороду с маслом.', 'Сверху выложите овощи и жарьте под крышкой 5-7 минут.', 'Подавайте с зеленью.'] },
      { id: 2, title: 'Куриный суп с лапшой', category: 'обед', time: 45, difficulty: 'средне', tags: ['суп', 'курица'], rating: 4.5, img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTSVUidS19yJyyElTqd58Q_T-7feZM5aiDfw18jymcl_w&s=10', author: 'TastyKitchen', ingredients: ['500 г куриного филе', '2 л воды', '1 морковь', '1 луковица', '100 г лапши', 'зелень', 'соль, перец'], steps: ['Нарежьте курицу кубиками, залейте водой и варите 20 минут.', 'Добавьте нарезанные морковь и лук, варите ещё 10 минут.', 'Засыпьте лапшу и варите 5 минут.', 'Посолите, поперчите, добавьте зелень.'] },
      { id: 3, title: 'Стейк с картофелем', category: 'ужин', time: 30, difficulty: 'сложно', tags: ['мясо', 'ужин'], rating: 4.9, img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTPGuKO8rcxTfh8mVPSP4HQBlDY0Bq2N3cKPeZrS9smpA&s=10', author: 'TastyKitchen', ingredients: ['2 стейка говядины', '4 картофелины', 'розмарин', 'чеснок', 'оливковое масло', 'соль, перец'], steps: ['Картофель нарежьте дольками, посыпьте солью и запекайте в духовке 20 минут.', 'Стейки обжарьте на сковороде с маслом по 3-4 минуты с каждой стороны.', 'Добавьте розмарин и чеснок для аромата.', 'Подавайте с картофелем.'] },
      { id: 4, title: 'Панкейки с ягодами', category: 'завтрак', time: 20, difficulty: 'легко', tags: ['десерт', 'завтрак'], rating: 4.7, img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJKLDG5D5y4zuqooSbScGw8bPnAb4j2EPnOHhCJyYtcQ&s=10', author: 'TastyKitchen', ingredients: ['200 г муки', '2 яйца', '200 мл молока', '1 ст.л. сахара', '1 ч.л. разрыхлителя', 'ягоды для подачи'], steps: ['Смешайте муку, сахар и разрыхлитель.', 'Взбейте яйца с молоком, добавьте к сухой смеси.', 'Жарьте на сухой сковороде до золотистого цвета.', 'Подавайте с ягодами и сиропом.'] },
      { id: 5, title: 'Греческий салат', category: 'обед', time: 10, difficulty: 'легко', tags: ['салат', 'овощи'], rating: 4.3, img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRDdJN6-YNI94xCC7HoIw9SwS-0DbWAqzkwqXcXvbzi_Q&s=10', author: 'TastyKitchen', ingredients: ['1 огурец', '2 помидора', '1 болгарский перец', '100 г сыра фета', 'маслины', 'оливковое масло'], steps: ['Нарежьте овощи крупными кусками.', 'Добавьте сыр фета и маслины.', 'Заправьте оливковым маслом, посолите.'] },
      { id: 6, title: 'Лазанья', category: 'ужин', time: 60, difficulty: 'сложно', tags: ['паста', 'мясо'], rating: 4.6, img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSwERqrmw79Kom2PdcQgTEhBQAc_ielRNEkfcKLCgoPQA&s=10', author: 'TastyKitchen', ingredients: ['500 г фарша', '9 листов лазаньи', '2 луковицы', 'чеснок', 'томатный соус', 'соус бешамель', 'сыр'], steps: ['Обжарьте фарш с луком и чесноком, добавьте томатный соус.', 'Приготовьте соус бешамель.', 'Соберите лазанью: соус, листы, фарш, бешамель, сыр.', 'Запекайте 40 минут при 180°C.'] },
      { id: 7, title: 'Тирамису', category: 'десерт', time: 40, difficulty: 'средне', tags: ['десерт', 'кофе'], rating: 4.9, img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ4BVn2UFHzsfQiu8KTgiVptSGFrfrWXTAMiiWJUJJC6w&s=10', author: 'TastyKitchen', ingredients: ['250 г маскарпоне', '3 яйца', '100 г сахара', 'савоярди', 'крепкий кофе', 'какао-порошок'], steps: ['Взбейте желтки с сахаром, добавьте маскарпоне.', 'Взбейте белки в пену, аккуратно вмешайте.', 'Окуните савоярди в кофе и выложите слоями.', 'Посыпьте какао и охладите 3 часа.'] },
      { id: 8, title: 'Овощное рагу', category: 'диетическое', time: 35, difficulty: 'средне', tags: ['диетическое', 'овощи'], rating: 4.2, img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSUnJlVNECZoWWI57kX6IUQKSkoMN6DAIvvGjEE386c6A&s=10', author: 'TastyKitchen', ingredients: ['1 кабачок', '1 баклажан', '2 помидора', '1 морковь', 'лук', 'чеснок', 'растительное масло'], steps: ['Нарежьте все овощи кубиками.', 'Обжарьте лук и морковь, добавьте остальные овощи.', 'Тушите под крышкой 20 минут до готовности.', 'Посолите, добавьте чеснок.'] }
    ];

    let allRecipes = [];

    function loadRecipes() {
      const stored = JSON.parse(localStorage.getItem('tasty_recipes')) || [];
      userRecipes = stored;
      allRecipes = [...defaultRecipes, ...stored];
      allRecipes = allRecipes.filter((r, i, arr) => arr.findIndex(x => x.id === r.id) === i);
    }

    function saveRecipes() {
      localStorage.setItem('tasty_recipes', JSON.stringify(userRecipes));
      loadRecipes();
    }

    loadRecipes();

    let currentFilter = 'all';
    let searchQuery = '';
    let favorites = JSON.parse(localStorage.getItem('tasty_favorites')) || [];
    let planner = JSON.parse(localStorage.getItem('tasty_planner')) || {};
    let pendingRecipeId = null;
    let isLoginMode = true;
    let editingRecipeId = null;

    const grid = document.getElementById('recipeGrid');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const themeToggle = document.getElementById('themeToggle');
    const plannerDays = document.getElementById('plannerDays');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalBody = document.getElementById('modalBody');
    const modalClose = document.getElementById('modalClose');
    const dayPickerOverlay = document.getElementById('dayPickerOverlay');
    const dayPickerClose = document.getElementById('dayPickerClose');
    const dayPickerRecipeName = document.getElementById('dayPickerRecipeName');
    const dayPickerButtons = document.getElementById('dayPickerButtons');
    const authOverlay = document.getElementById('authOverlay');
    const authClose = document.getElementById('authClose');
    const authTitle = document.getElementById('authTitle');
    const authError = document.getElementById('authError');
    const authName = document.getElementById('authName');
    const authNameField = document.getElementById('authNameField');
    const authPass = document.getElementById('authPass');
    const authSubmit = document.getElementById('authSubmit');
    const authToggleLink = document.getElementById('authToggleLink');
    const authSwitch = document.getElementById('authSwitch');
    const userBtn = document.getElementById('userBtn');
    const userName = document.getElementById('userName');
    const userIcon = document.getElementById('userIcon');
    const bannerBtn = document.getElementById('bannerBtn');
    const addRecipeBtn = document.getElementById('addRecipeBtn');
    const recipeModalOverlay = document.getElementById('recipeModalOverlay');
    const recipeModalClose = document.getElementById('recipeModalClose');
    const recipeModalTitle = document.getElementById('recipeModalTitle');
    const recipeError = document.getElementById('recipeError');
    const recipeForm = document.getElementById('recipeForm');
    const recipeTitle = document.getElementById('recipeTitle');
    const recipeCategory = document.getElementById('recipeCategory');
    const recipeTime = document.getElementById('recipeTime');
    const recipeDifficulty = document.getElementById('recipeDifficulty');
    const recipeTags = document.getElementById('recipeTags');
    const recipeImg = document.getElementById('recipeImg');
    const recipeIngredients = document.getElementById('recipeIngredients');
    const recipeSteps = document.getElementById('recipeSteps');
    const recipeSubmit = document.getElementById('recipeSubmit');

    function updateUserUI() {
      if (currentUser) {
        userName.textContent = currentUser.name;
        userIcon.textContent = '👤';
        userBtn.classList.add('btn-outline');
      } else {
        userName.textContent = 'Войти';
        userIcon.textContent = '👤';
        userBtn.classList.remove('btn-outline');
      }
    }

    function canEditRecipe(recipe) {
      if (!currentUser) return false;
      return recipe.author === currentUser.name || recipe.author === 'TastyKitchen';
    }

    function renderRecipes() {
      let filtered = allRecipes.filter(r => {
        const matchCategory = currentFilter === 'all' || r.category === currentFilter;
        const matchSearch = r.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                            r.tags.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()));
        return matchCategory && matchSearch;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-secondary); padding:40px;">🍽️ Рецептов не найдено. Добавьте свой!</p>`;
        return;
      }

      grid.innerHTML = filtered.map(r => {
        const isFav = favorites.includes(r.id);
        const isOwn = currentUser && r.author === currentUser.name;
        return `
          <div class="card" data-id="${r.id}">
            <div class="card-img" data-id="${r.id}">
              <img src="${r.img || 'https://via.placeholder.com/400x300/E8DDD4/6B5340?text=🍳'}" alt="${r.title}" loading="lazy" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=placeholder>🍳</div>';">
            </div>
            <div class="card-tags">
              ${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
            <div class="card-title">${r.title} <span class="author">by ${r.author || 'TastyKitchen'}</span></div>
            <div class="card-meta">
              <span>⏱ ${r.time} мин</span>
              <span>⭐ ${r.rating || 4.0}</span>
              <span>${r.difficulty}</span>
            </div>
            <div class="card-actions">
              <button class="btn btn-primary btn-plan" data-id="${r.id}">📅 В план</button>
              <button class="btn btn-outline btn-fav ${isFav ? 'active' : ''}" data-id="${r.id}">${isFav ? '❤️' : '🤍'}</button>
              <button class="btn btn-detail" data-id="${r.id}">📖</button>
              ${isOwn ? `<button class="btn btn-delete btn-delete-recipe" data-id="${r.id}">✕</button>` : ''}
            </div>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.btn-plan').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          if (!currentUser) { openAuth(); return; }
          const id = parseInt(this.dataset.id);
          openDayPicker(id);
        });
      });
      document.querySelectorAll('.btn-fav').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          if (!currentUser) { openAuth(); return; }
          const id = parseInt(this.dataset.id);
          toggleFavorite(id);
        });
      });
      document.querySelectorAll('.btn-detail').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const id = parseInt(this.dataset.id);
          openModal(id);
        });
      });
      document.querySelectorAll('.card-img').forEach(el => {
        el.addEventListener('click', function() {
          const id = parseInt(this.dataset.id);
          openModal(id);
        });
      });
      document.querySelectorAll('.btn-delete-recipe').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const id = parseInt(this.dataset.id);
          deleteRecipe(id);
        });
      });
    }

    function deleteRecipe(id) {
      const recipe = allRecipes.find(r => r.id === id);
      if (!recipe) return;
      if (recipe.author !== currentUser?.name) {
        showToast('❌ Вы не можете удалить этот рецепт.');
        return;
      }
      if (confirm(`Удалить рецепт "${recipe.title}"?`)) {
        userRecipes = userRecipes.filter(r => r.id !== id);
        saveRecipes();
        favorites = favorites.filter(f => f !== id);
        localStorage.setItem('tasty_favorites', JSON.stringify(favorites));
        renderRecipes();
        renderPlanner();
        showToast(`🗑️ "${recipe.title}" удалён.`);
      }
    }

    function toggleFavorite(id) {
      const idx = favorites.indexOf(id);
      if (idx > -1) favorites.splice(idx, 1);
      else favorites.push(id);
      localStorage.setItem('tasty_favorites', JSON.stringify(favorites));
      renderRecipes();
      renderPlanner();
    }

    function addToPlanner(id, day) {
      if (!currentUser) { openAuth(); return; }
      if (!planner[day]) planner[day] = [];
      const recipe = allRecipes.find(r => r.id === id);
      if (!recipe) return;
      if (planner[day].includes(recipe.title)) {
        showToast(`⚠️ "${recipe.title}" уже есть в плане на ${day}.`);
        return;
      }
      planner[day].push(recipe.title);
      localStorage.setItem('tasty_planner', JSON.stringify(planner));
      renderPlanner();
      renderRecipes();
      showToast(`✅ "${recipe.title}" добавлен в план на ${day}`);
    }

    function removeFromPlanner(day, mealTitle) {
      if (planner[day]) {
        const idx = planner[day].indexOf(mealTitle);
        if (idx > -1) {
          planner[day].splice(idx, 1);
          if (planner[day].length === 0) delete planner[day];
          localStorage.setItem('tasty_planner', JSON.stringify(planner));
          renderPlanner();
          renderRecipes();
          showToast(`🗑️ "${mealTitle}" удалено из плана на ${day}`);
        }
      }
    }

    function renderPlanner() {
      const days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
      let html = '';
      days.forEach(d => {
        const meals = planner[d] || [];
        html += `
          <div class="planner-day" data-day="${d}">
            <strong>${d}</strong>
            ${meals.length ? meals.map(m => `
              <div class="meal">
                <span>${m}</span>
                <button class="remove-meal" data-day="${d}" data-meal="${m}">✕</button>
              </div>
            `).join('') : '<div class="empty">– пусто</div>'}
          </div>
        `;
      });
      plannerDays.innerHTML = html;

      document.querySelectorAll('.remove-meal').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          if (!currentUser) { openAuth(); return; }
          const day = this.dataset.day;
          const meal = this.dataset.meal;
          removeFromPlanner(day, meal);
        });
      });
    }

    function openDayPicker(recipeId) {
      const recipe = allRecipes.find(r => r.id === recipeId);
      if (!recipe) return;
      pendingRecipeId = recipeId;
      dayPickerRecipeName.textContent = `"${recipe.title}" — выберите день:`;
      const days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
      dayPickerButtons.innerHTML = days.map(d => `<button data-day="${d}">${d}</button>`).join('');
      dayPickerOverlay.classList.add('open');
      document.body.classList.add('no-scroll');

      dayPickerButtons.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', function() {
          const day = this.dataset.day;
          addToPlanner(pendingRecipeId, day);
          closeDayPicker();
        });
      });
    }

    function closeDayPicker() {
      dayPickerOverlay.classList.remove('open');
      document.body.classList.remove('no-scroll');
      pendingRecipeId = null;
    }

    dayPickerOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeDayPicker();
    });
    dayPickerClose.addEventListener('click', closeDayPicker);

    function openModal(id) {
      const recipe = allRecipes.find(r => r.id === id);
      if (!recipe) return;
      const isFav = favorites.includes(recipe.id);
      const isOwn = currentUser && recipe.author === currentUser.name;
      modalBody.innerHTML = `
        <h2>${recipe.title}</h2>
        <div style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:8px;">👨‍🍳 ${recipe.author || 'TastyKitchen'}</div>
        <div class="subtitle">
          <span>⏱ ${recipe.time} мин</span>
          <span>⭐ ${recipe.rating || 4.0}</span>
          <span>${recipe.difficulty}</span>
          <span>📂 ${recipe.category}</span>
        </div>
        <div class="tags">
          ${recipe.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
        <div class="modal-section">
          <h4>🛒 Ингредиенты</h4>
          <ul>
            ${recipe.ingredients.map(i => `<li>${i}</li>`).join('')}
          </ul>
        </div>
        <div class="modal-section">
          <h4>👨‍🍳 Пошаговое приготовление</h4>
          <ol>
            ${recipe.steps.map((s, idx) => `<li>${s}</li>`).join('')}
          </ol>
        </div>
        <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn btn-primary" id="modalPlanBtn" data-id="${recipe.id}">📅 В план</button>
          <button class="btn btn-outline btn-fav ${isFav ? 'active' : ''}" id="modalFavBtn" data-id="${recipe.id}">${isFav ? '❤️ В избранном' : '🤍 В избранное'}</button>
          ${isOwn ? `<button class="btn btn-outline" id="modalEditBtn" data-id="${recipe.id}">✏️ Редактировать</button>` : ''}
        </div>
      `;
      modalOverlay.classList.add('open');
      document.body.classList.add('no-scroll');

      document.getElementById('modalPlanBtn').addEventListener('click', function() {
        const id = parseInt(this.dataset.id);
        if (!currentUser) { closeModal(); openAuth(); return; }
        closeModal();
        openDayPicker(id);
      });
      document.getElementById('modalFavBtn').addEventListener('click', function() {
        const id = parseInt(this.dataset.id);
        if (!currentUser) { openAuth(); return; }
        toggleFavorite(id);
        openModal(id);
      });
      const editBtn = document.getElementById('modalEditBtn');
      if (editBtn) {
        editBtn.addEventListener('click', function() {
          const id = parseInt(this.dataset.id);
          closeModal();
          openRecipeEditor(id);
        });
      }
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      document.body.classList.remove('no-scroll');
    }

    modalOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    modalClose.addEventListener('click', closeModal);
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        if (modalOverlay.classList.contains('open')) closeModal();
        if (dayPickerOverlay.classList.contains('open')) closeDayPicker();
        if (authOverlay.classList.contains('open')) closeAuth();
        if (recipeModalOverlay.classList.contains('open')) closeRecipeEditor();
      }
    });

    function openAuth(mode) {
      if (mode === 'register') {
        isLoginMode = false;
        authTitle.textContent = 'Регистрация';
        authSubmit.textContent = 'Зарегистрироваться';
        authSwitch.innerHTML = 'Уже есть аккаунт? <a id="authToggleLink">Войти</a>';
        authNameField.style.display = 'block';
      } else {
        isLoginMode = true;
        authTitle.textContent = 'Вход';
        authSubmit.textContent = 'Войти';
        authSwitch.innerHTML = 'Нет аккаунта? <a id="authToggleLink">Зарегистрироваться</a>';
        authNameField.style.display = 'block';
      }
      authError.textContent = '';
      authName.value = '';
      authPass.value = '';
      authOverlay.classList.add('open');
      document.body.classList.add('no-scroll');
      document.getElementById('authToggleLink').addEventListener('click', function(e) {
        e.preventDefault();
        openAuth(isLoginMode ? 'register' : 'login');
      });
    }

    function closeAuth() {
      authOverlay.classList.remove('open');
      document.body.classList.remove('no-scroll');
    }

    authOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeAuth();
    });
    authClose.addEventListener('click', closeAuth);

    function handleAuth() {
      const name = authName.value.trim();
      const pass = authPass.value.trim();
      authError.textContent = '';

      if (!name || !pass) {
        authError.textContent = 'Заполните все поля.';
        return;
      }

      if (isLoginMode) {
        const user = users.find(u => u.name === name && u.pass === pass);
        if (user) {
          currentUser = { name: user.name };
          localStorage.setItem('tasty_user', JSON.stringify(currentUser));
          updateUserUI();
          closeAuth();
          showToast(`👋 Добро пожаловать, ${user.name}!`);
          renderRecipes();
          renderPlanner();
        } else {
          authError.textContent = 'Неверное имя или пароль.';
        }
      } else {
        if (users.find(u => u.name === name)) {
          authError.textContent = 'Пользователь с таким именем уже существует.';
          return;
        }
        users.push({ name, pass });
        localStorage.setItem('tasty_users', JSON.stringify(users));
        currentUser = { name };
        localStorage.setItem('tasty_user', JSON.stringify(currentUser));
        updateUserUI();
        closeAuth();
        showToast(`🎉 Добро пожаловать, ${name}!`);
        renderRecipes();
        renderPlanner();
      }
    }

    authSubmit.addEventListener('click', handleAuth);
    authPass.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleAuth();
    });

    userBtn.addEventListener('click', function() {
      if (currentUser) {
        if (confirm(`Выйти из аккаунта "${currentUser.name}"?`)) {
          currentUser = null;
          localStorage.removeItem('tasty_user');
          updateUserUI();
          showToast('👋 Вы вышли из аккаунта.');
          renderRecipes();
          renderPlanner();
        }
      } else {
        openAuth('login');
      }
    });

    bannerBtn.addEventListener('click', function() {
      if (!currentUser) openAuth('register');
      else showToast('🍳 Вы уже с нами! Добавляйте рецепты в план.');
    });

    function openRecipeEditor(editId) {
      if (!currentUser) { openAuth(); return; }
      editingRecipeId = editId || null;
      if (editingRecipeId) {
        const recipe = allRecipes.find(r => r.id === editingRecipeId);
        if (!recipe || recipe.author !== currentUser.name) {
          showToast('❌ Вы не можете редактировать этот рецепт.');
          return;
        }
        recipeModalTitle.textContent = '✏️ Редактировать рецепт';
        recipeTitle.value = recipe.title || '';
        recipeCategory.value = recipe.category || 'другое';
        recipeTime.value = recipe.time || '';
        recipeDifficulty.value = recipe.difficulty || 'средне';
        recipeTags.value = (recipe.tags || []).join(', ');
        recipeImg.value = recipe.img || '';
        recipeIngredients.value = (recipe.ingredients || []).join('\n');
        recipeSteps.value = (recipe.steps || []).join('\n');
      } else {
        recipeModalTitle.textContent = '➕ Новый рецепт';
        recipeForm.reset();
        recipeCategory.value = 'другое';
        recipeDifficulty.value = 'средне';
        recipeImg.value = '';
      }
      recipeError.textContent = '';
      recipeModalOverlay.classList.add('open');
      document.body.classList.add('no-scroll');
    }

    function closeRecipeEditor() {
      recipeModalOverlay.classList.remove('open');
      document.body.classList.remove('no-scroll');
      editingRecipeId = null;
    }

    recipeModalClose.addEventListener('click', closeRecipeEditor);
    recipeModalOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeRecipeEditor();
    });

    function saveRecipe() {
      const title = recipeTitle.value.trim();
      const category = recipeCategory.value;
      const time = parseInt(recipeTime.value);
      const difficulty = recipeDifficulty.value;
      const tagsStr = recipeTags.value.trim();
      const img = recipeImg.value.trim();
      const ingredientsStr = recipeIngredients.value.trim();
      const stepsStr = recipeSteps.value.trim();

      recipeError.textContent = '';

      if (!title) { recipeError.textContent = 'Введите название блюда.'; return; }
      if (!time || time < 1) { recipeError.textContent = 'Укажите корректное время приготовления.'; return; }
      if (!ingredientsStr) { recipeError.textContent = 'Добавьте ингредиенты.'; return; }
      if (!stepsStr) { recipeError.textContent = 'Добавьте шаги приготовления.'; return; }

      const tags = tagsStr ? tagsStr.split(',').map(t => t.trim().toLowerCase()).filter(t => t) : [];
      const ingredients = ingredientsStr.split('\n').filter(i => i.trim());
      const steps = stepsStr.split('\n').filter(s => s.trim());

      const recipeData = {
        title,
        category,
        time,
        difficulty,
        tags,
        img: img || 'https://via.placeholder.com/400x300/E8DDD4/6B5340?text=🍳',
        ingredients,
        steps,
        author: currentUser.name,
        rating: 4.0
      };

      if (editingRecipeId) {
        const idx = userRecipes.findIndex(r => r.id === editingRecipeId);
        if (idx === -1) { showToast('❌ Рецепт не найден.'); return; }
        userRecipes[idx] = { ...userRecipes[idx], ...recipeData };
        saveRecipes();
        showToast(`✅ Рецепт "${title}" обновлён!`);
      } else {
        const maxId = allRecipes.reduce((max, r) => Math.max(max, r.id), 0);
        const newRecipe = { id: maxId + 1, ...recipeData };
        userRecipes.push(newRecipe);
        saveRecipes();
        showToast(`🎉 Рецепт "${title}" добавлен!`);
      }

      closeRecipeEditor();
      renderRecipes();
      renderPlanner();
    }

    recipeSubmit.addEventListener('click', saveRecipe);

    addRecipeBtn.addEventListener('click', function() {
      if (!currentUser) { openAuth(); return; }
      openRecipeEditor(null);
    });

    function showToast(message) {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: var(--card-bg); color: var(--text);
        padding: 14px 28px; border-radius: 40px;
        box-shadow: 0 8px 30px var(--shadow);
        border: 1px solid var(--border);
        font-size: 0.95rem;
        z-index: 2000;
        animation: fadeUp 0.3s ease;
        transition: opacity 0.5s;
        max-width: 90%;
        text-align: center;
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 500);
      }, 3000);
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        filterBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        renderRecipes();
      });
    });

    function performSearch() {
      searchQuery = searchInput.value.trim();
      renderRecipes();
    }
    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keyup', (e) => {
      if (e.key === 'Enter') performSearch();
    });

    let darkTheme = localStorage.getItem('tasty_theme') === 'dark';
    function applyTheme() {
      document.documentElement.setAttribute('data-theme', darkTheme ? 'dark' : 'light');
      themeToggle.textContent = darkTheme ? '☀️ Светлая' : '🌙 Тёмная';
      localStorage.setItem('tasty_theme', darkTheme ? 'dark' : 'light');
    }
    themeToggle.addEventListener('click', () => {
      darkTheme = !darkTheme;
      applyTheme();
    });
    applyTheme();

    updateUserUI();
    renderRecipes();
    renderPlanner();
  })();
</script>

<footer style="margin-top:32px;padding:16px 0;border-top:1px solid var(--border);text-align:center;color:var(--text-secondary);font-size:0.85rem;">
  TastyKitchen © 2026 — Готовьте с удовольствием!
</footer>
</body>
