<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TastyKitchen — агрегатор рецептов</title>
  <!-- Фавикон (SVG через data-URI) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23E67E22'/%3E%3Ccircle cx='50' cy='45' r='28' fill='%23FFFFFF' opacity='0.9'/%3E%3Cpath d='M35 35 L45 35 L45 55 L35 55 Z' fill='%23E67E22'/%3E%3Cpath d='M55 35 L65 35 L65 55 L55 55 Z' fill='%23E67E22'/%3E%3Cpath d='M42 30 L58 30 L50 20 Z' fill='%23E67E22'/%3E%3Ccircle cx='50' cy='42' r='6' fill='%23E67E22'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23E67E22'/%3E%3Ccircle cx='90' cy='80' r='50' fill='%23FFFFFF' opacity='0.9'/%3E%3Cpath d='M60 65 L80 65 L80 95 L60 95 Z' fill='%23E67E22'/%3E%3Cpath d='M100 65 L120 65 L120 95 L100 95 Z' fill='%23E67E22'/%3E%3Cpath d='M75 55 L105 55 L90 40 Z' fill='%23E67E22'/%3E%3Ccircle cx='90' cy='78' r='10' fill='%23E67E22'/%3E%3C/svg%3E">
  <style>
    /* ===== CSS-переменные (светлая тема) ===== */
    :root {
      --bg: #F8F4F0;
      --card-bg: #FFFFFF;
      --text: #2D1B0E;
      --text-secondary: #6B5340;
      --border: #E8DDD4;
      --accent: #E67E22;
      --accent-light: #F39C12;
      --shadow: rgba(0,0,0,0.08);
      --radius: 20px;
      --transition: 0.3s cubic-bezier(.4,0,.2,1);
      --font: 'Nunito Sans', system-ui, -apple-system, sans-serif;
      --modal-overlay: rgba(0,0,0,0.5);
    }

    /* Тёмная тема */
    [data-theme="dark"] {
      --bg: #1A1410;
      --card-bg: #2A221C;
      --text: #F0E6D8;
      --text-secondary: #A89080;
      --border: #3D3228;
      --shadow: rgba(0,0,0,0.4);
      --modal-overlay: rgba(0,0,0,0.7);
    }

    /* ===== Сброс и база ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      transition: background var(--transition), color var(--transition);
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--accent); text-decoration: none; }
    img { max-width: 100%; display: block; }

    /* ===== Шапка ===== */
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0 20px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 24px;
    }
    .logo {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    .logo span { color: var(--text); }
    .header-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .search-box {
      display: flex;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 4px 16px;
      align-items: center;
      transition: var(--transition);
    }
    .search-box:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(230,126,34,0.2);
    }
    .search-box input {
      border: none;
      background: transparent;
      padding: 10px 0;
      font-size: 0.95rem;
      width: 180px;
      color: var(--text);
      outline: none;
    }
    .search-box input::placeholder { color: var(--text-secondary); }
    .search-box button {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-secondary);
      padding: 4px;
    }
    .theme-toggle {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: var(--transition);
    }
    .theme-toggle:hover {
      border-color: var(--accent);
    }

    /* ===== Фильтры ===== */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .filter-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 20px;
      font-size: 0.9rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: var(--transition);
    }
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .filter-btn:hover {
      border-color: var(--accent);
    }

    /* ===== Сетка карточек ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      flex: 1;
    }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 4px 16px var(--shadow);
      transition: transform var(--transition), box-shadow var(--transition);
      cursor: default;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      position: relative;
      animation: fadeUp 0.5s ease forwards;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px var(--shadow);
    }
    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      background: #e0d6cc;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
      position: relative;
      background-image: linear-gradient(135deg, var(--border) 0%, transparent 100%);
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
      cursor: pointer;
    }
    .card:hover .card-img img { transform: scale(1.02); }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .tag {
      background: var(--bg);
      color: var(--text-secondary);
      font-size: 0.7rem;
      padding: 2px 10px;
      border-radius: 40px;
      border: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .card-meta span { display: flex; align-items: center; gap: 4px; }
    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      flex-wrap: wrap;
    }
    .btn {
      background: var(--bg);
      border: none;
      padding: 8px 14px;
      border-radius: 40px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--text);
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: var(--accent-light);
      transform: scale(0.97);
    }
    .btn-outline {
      border-color: var(--border);
      background: transparent;
    }
    .btn-outline:hover {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .btn-fav.active {
      background: #E85454;
      color: #fff;
      border-color: #E85454;
    }
    .btn-detail {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      flex: 1;
    }
    .btn-detail:hover {
      background: var(--accent);
      color: #fff;
    }

    /* ===== Планировщик ===== */
    .planner-widget {
      margin-top: 32px;
      padding: 20px;
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .planner-widget h3 {
      margin-bottom: 12px;
      font-size: 1.2rem;
    }
    .planner-days {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px,1fr));
      gap: 12px;
    }
    .planner-day {
      background: var(--bg);
      padding: 10px;
      border-radius: 12px;
      text-align: center;
      font-size: 0.9rem;
      border: 1px solid var(--border);
    }
    .planner-day strong { display: block; font-size: 0.75rem; opacity: 0.7; }
    .planner-day .meal { margin-top: 4px; color: var(--accent); font-weight: 600; }

    /* ===== Модальное окно ===== */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--modal-overlay);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card-bg);
      border-radius: var(--radius);
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 30px;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: modalIn 0.3s ease;
    }
    @keyframes modalIn {
      0% { opacity: 0; transform: scale(0.95) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 2rem;
      cursor: pointer;
      color: var(--text-secondary);
      background: none;
      border: none;
      transition: var(--transition);
    }
    .modal-close:hover { color: var(--accent); transform: rotate(90deg); }
    .modal h2 {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .modal .subtitle {
      color: var(--text-secondary);
      margin-bottom: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    .modal .subtitle span { display: flex; align-items: center; gap: 4px; }
    .modal-section {
      margin-top: 20px;
    }
    .modal-section h4 {
      font-size: 1.1rem;
      margin-bottom: 8px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 4px;
    }
    .modal-section ul, .modal-section ol {
      padding-left: 24px;
      line-height: 1.6;
    }
    .modal-section li { margin-bottom: 4px; }
    .modal .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0;
    }

    /* ===== Анимации ===== */
    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ===== Адаптивность ===== */
    @media (max-width: 640px) {
      header { flex-direction: column; align-items: stretch; }
      .search-box input { width: 100%; }
      .grid { grid-template-columns: 1fr; }
      .filters { justify-content: center; }
      .planner-days { grid-template-columns: 1fr 1fr; }
      .modal { padding: 20px; }
    }
    @media (min-width: 768px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (min-width: 1024px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* Скелетон */
    .card-img .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: var(--border);
      color: var(--text-secondary);
      font-size: 2rem;
    }

    /* Блокировка скролла при открытом модальном окне */
    body.no-scroll { overflow: hidden; }
  </style>
</head>
<body>

<header>
  <div class="logo">Tasty<span>Kitchen</span></div>
  <div class="header-controls">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Поиск рецептов...">
      <button id="searchBtn">🔍</button>
    </div>
    <button class="theme-toggle" id="themeToggle">🌙 Тёмная</button>
  </div>
</header>

<!-- Фильтры -->
<div class="filters" id="filterContainer">
  <button class="filter-btn active" data-filter="all">Все</button>
  <button class="filter-btn" data-filter="завтрак">Завтраки</button>
  <button class="filter-btn" data-filter="обед">Обеды</button>
  <button class="filter-btn" data-filter="ужин">Ужины</button>
  <button class="filter-btn" data-filter="десерт">Десерты</button>
  <button class="filter-btn" data-filter="диетическое">Диетическое</button>
</div>

<!-- Сетка рецептов -->
<div class="grid" id="recipeGrid"></div>

<!-- Планировщик -->
<div class="planner-widget">
  <h3>📅 План на неделю</h3>
  <div class="planner-days" id="plannerDays"></div>
</div>

<!-- Модальное окно -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent">
    <button class="modal-close" id="modalClose">&times;</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  (function() {
    // ===== Данные рецептов (с ингредиентами и шагами) =====
    const recipes = [
      {
        id: 1,
        title: 'Омлет с овощами',
        category: 'завтрак',
        time: 15,
        difficulty: 'легко',
        tags: ['завтрак', 'овощи'],
        rating: 4.8,
        img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTrIHq_VIcNRSnkjCqONzQMqNijTMn0uS2NOo7hD1boaA&s=10',
        ingredients: ['3 яйца', '50 мл молока', '1 помидор', '1/2 болгарского перца', 'зелень', 'соль, перец'],
        steps: ['Взбейте яйца с молоком и щепоткой соли.', 'Нарежьте овощи кубиками.', 'Вылейте яичную смесь на разогретую сковороду с маслом.', 'Сверху выложите овощи и жарьте под крышкой 5-7 минут.', 'Подавайте с зеленью.']
      },
      {
        id: 2,
        title: 'Куриный суп с лапшой',
        category: 'обед',
        time: 45,
        difficulty: 'средне',
        tags: ['суп', 'курица'],
        rating: 4.5,
        img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTSVUidS19yJyyElTqd58Q_T-7feZM5aiDfw18jymcl_w&s=10',
        ingredients: ['500 г куриного филе', '2 л воды', '1 морковь', '1 луковица', '100 г лапши', 'зелень', 'соль, перец'],
        steps: ['Нарежьте курицу кубиками, залейте водой и варите 20 минут.', 'Добавьте нарезанные морковь и лук, варите ещё 10 минут.', 'Засыпьте лапшу и варите 5 минут.', 'Посолите, поперчите, добавьте зелень.']
      },
      {
        id: 3,
        title: 'Стейк с картофелем',
        category: 'ужин',
        time: 30,
        difficulty: 'сложно',
        tags: ['мясо', 'ужин'],
        rating: 4.9,
        img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTPGuKO8rcxTfh8mVPSP4HQBlDY0Bq2N3cKPeZrS9smpA&s=10',
        ingredients: ['2 стейка говядины', '4 картофелины', 'розмарин', 'чеснок', 'оливковое масло', 'соль, перец'],
        steps: ['Картофель нарежьте дольками, посыпьте солью и запекайте в духовке 20 минут.', 'Стейки обжарьте на сковороде с маслом по 3-4 минуты с каждой стороны.', 'Добавьте розмарин и чеснок для аромата.', 'Подавайте с картофелем.']
      },
      {
        id: 4,
        title: 'Панкейки с ягодами',
        category: 'завтрак',
        time: 20,
        difficulty: 'легко',
        tags: ['десерт', 'завтрак'],
        rating: 4.7,
        img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJKLDG5D5y4zuqooSbScGw8bPnAb4j2EPnOHhCJyYtcQ&s=10',
        ingredients: ['200 г муки', '2 яйца', '200 мл молока', '1 ст.л. сахара', '1 ч.л. разрыхлителя', 'ягоды для подачи'],
        steps: ['Смешайте муку, сахар и разрыхлитель.', 'Взбейте яйца с молоком, добавьте к сухой смеси.', 'Жарьте на сухой сковороде до золотистого цвета.', 'Подавайте с ягодами и сиропом.']
      },
      {
        id: 5,
        title: 'Греческий салат',
        category: 'обед',
        time: 10,
        difficulty: 'легко',
        tags: ['салат', 'овощи'],
        rating: 4.3,
        img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRDdJN6-YNI94xCC7HoIw9SwS-0DbWAqzkwqXcXvbzi_Q&s=10',
        ingredients: ['1 огурец', '2 помидора', '1 болгарский перец', '100 г сыра фета', 'маслины', 'оливковое масло'],
        steps: ['Нарежьте овощи крупными кусками.', 'Добавьте сыр фета и маслины.', 'Заправьте оливковым маслом, посолите.']
      },
      {
        id: 6,
        title: 'Лазанья',
        category: 'ужин',
        time: 60,
        difficulty: 'сложно',
        tags: ['паста', 'мясо'],
        rating: 4.6,
        img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSwERqrmw79Kom2PdcQgTEhBQAc_ielRNEkfcKLCgoPQA&s=10',
        ingredients: ['500 г фарша', '9 листов лазаньи', '2 луковицы', 'чеснок', 'томатный соус', 'соус бешамель', 'сыр'],
        steps: ['Обжарьте фарш с луком и чесноком, добавьте томатный соус.', 'Приготовьте соус бешамель.', 'Соберите лазанью: соус, листы, фарш, бешамель, сыр.', 'Запекайте 40 минут при 180°C.']
      },
      {
        id: 7,
        title: 'Тирамису',
        category: 'десерт',
        time: 40,
        difficulty: 'средне',
        tags: ['десерт', 'кофе'],
        rating: 4.9,
        img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ4BVn2UFHzsfQiu8KTgiVptSGFrfrWXTAMiiWJUJJC6w&s=10',
        ingredients: ['250 г маскарпоне', '3 яйца', '100 г сахара', 'савоярди', 'крепкий кофе', 'какао-порошок'],
        steps: ['Взбейте желтки с сахаром, добавьте маскарпоне.', 'Взбейте белки в пену, аккуратно вмешайте.', 'Окуните савоярди в кофе и выложите слоями.', 'Посыпьте какао и охладите 3 часа.']
      },
      {
        id: 8,
        title: 'Овощное рагу',
        category: 'диетическое',
        time: 35,
        difficulty: 'средне',
        tags: ['диетическое', 'овощи'],
        rating: 4.2,
        img: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSUnJlVNECZoWWI57kX6IUQKSkoMN6DAIvvGjEE386c6A&s=10',
        ingredients: ['1 кабачок', '1 баклажан', '2 помидора', '1 морковь', 'лук', 'чеснок', 'растительное масло'],
        steps: ['Нарежьте все овощи кубиками.', 'Обжарьте лук и морковь, добавьте остальные овощи.', 'Тушите под крышкой 20 минут до готовности.', 'Посолите, добавьте чеснок.']
      }
    ];

    // ===== Состояние =====
    let currentFilter = 'all';
    let searchQuery = '';
    let favorites = JSON.parse(localStorage.getItem('tasty_favorites')) || [];
    let planner = JSON.parse(localStorage.getItem('tasty_planner')) || {};

    // ===== DOM-ссылки =====
    const grid = document.getElementById('recipeGrid');
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const filterBtns = document.querySelectorAll('.filter-btn');
    const themeToggle = document.getElementById('themeToggle');
    const plannerDays = document.getElementById('plannerDays');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalBody = document.getElementById('modalBody');
    const modalClose = document.getElementById('modalClose');

    // ===== Рендер карточек =====
    function renderRecipes() {
      let filtered = recipes.filter(r => {
        const matchCategory = currentFilter === 'all' || r.category === currentFilter;
        const matchSearch = r.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                            r.tags.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()));
        return matchCategory && matchSearch;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; color:var(--text-secondary); padding:40px;">🍽️ Рецептов не найдено. Попробуйте изменить фильтры.</p>`;
        return;
      }

      grid.innerHTML = filtered.map(r => {
        const isFav = favorites.includes(r.id);
        return `
          <div class="card" data-id="${r.id}">
            <div class="card-img" data-id="${r.id}">
              <img src="${r.img}" alt="${r.title}" loading="lazy" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=placeholder>🍳</div>';">
            </div>
            <div class="card-tags">
              ${r.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>
            <div class="card-title">${r.title}</div>
            <div class="card-meta">
              <span>⏱ ${r.time} мин</span>
              <span>⭐ ${r.rating}</span>
              <span>${r.difficulty}</span>
            </div>
            <div class="card-actions">
              <button class="btn btn-primary btn-plan" data-id="${r.id}">📅 В план</button>
              <button class="btn btn-outline btn-fav ${isFav ? 'active' : ''}" data-id="${r.id}">${isFav ? '❤️' : '🤍'}</button>
              <button class="btn btn-detail" data-id="${r.id}">📖 Подробнее</button>
            </div>
          </div>
        `;
      }).join('');

      // Обработчики событий для кнопок
      document.querySelectorAll('.btn-plan').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const id = parseInt(this.dataset.id);
          addToPlanner(id);
        });
      });
      document.querySelectorAll('.btn-fav').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const id = parseInt(this.dataset.id);
          toggleFavorite(id);
        });
      });
      document.querySelectorAll('.btn-detail').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const id = parseInt(this.dataset.id);
          openModal(id);
        });
      });
      // Клик по изображению тоже открывает модалку
      document.querySelectorAll('.card-img').forEach(el => {
        el.addEventListener('click', function() {
          const id = parseInt(this.dataset.id);
          openModal(id);
        });
      });
    }

    // ===== Избранное =====
    function toggleFavorite(id) {
      const idx = favorites.indexOf(id);
      if (idx > -1) {
        favorites.splice(idx, 1);
      } else {
        favorites.push(id);
      }
      localStorage.setItem('tasty_favorites', JSON.stringify(favorites));
      renderRecipes();
      renderPlanner();
    }

    // ===== Планировщик =====
    function addToPlanner(id) {
      const days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
      let targetDay = 'Пн';
      for (let d of days) {
        if (!planner[d] || planner[d].length === 0) { targetDay = d; break; }
      }
      if (!planner[targetDay]) planner[targetDay] = [];
      const recipe = recipes.find(r => r.id === id);
      if (recipe && !planner[targetDay].includes(recipe.title)) {
        planner[targetDay].push(recipe.title);
        localStorage.setItem('tasty_planner', JSON.stringify(planner));
        renderPlanner();
        renderRecipes();
        // показываем уведомление
        showToast(`✅ "${recipe.title}" добавлен в план на ${targetDay}`);
      } else {
        showToast('⚠️ Это блюдо уже есть в планировщике.');
      }
    }

    function renderPlanner() {
      const days = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
      let html = '';
      days.forEach(d => {
        const meals = planner[d] || [];
        html += `
          <div class="planner-day" data-day="${d}">
            <strong>${d}</strong>
            ${meals.length ? meals.map(m => `<div class="meal">${m}</div>`).join('') : '<div style="color:var(--text-secondary);font-size:0.8rem;">–</div>'}
          </div>
        `;
      });
      plannerDays.innerHTML = html;
      // Двойной клик по дню — очистка
      document.querySelectorAll('.planner-day').forEach(el => {
        el.addEventListener('dblclick', function() {
          const day = this.dataset.day;
          if (day && planner[day] && planner[day].length > 0) {
            if (confirm(`Удалить все блюда из плана на ${day}?`)) {
              delete planner[day];
              localStorage.setItem('tasty_planner', JSON.stringify(planner));
              renderPlanner();
              renderRecipes();
            }
          }
        });
      });
    }

    // ===== Модальное окно =====
    function openModal(id) {
      const recipe = recipes.find(r => r.id === id);
      if (!recipe) return;
      const isFav = favorites.includes(recipe.id);
      modalBody.innerHTML = `
        <h2>${recipe.title}</h2>
        <div class="subtitle">
          <span>⏱ ${recipe.time} мин</span>
          <span>⭐ ${recipe.rating}</span>
          <span>${recipe.difficulty}</span>
          <span>📂 ${recipe.category}</span>
        </div>
        <div class="tags">
          ${recipe.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
        <div class="modal-section">
          <h4>🛒 Ингредиенты</h4>
          <ul>
            ${recipe.ingredients.map(i => `<li>${i}</li>`).join('')}
          </ul>
        </div>
        <div class="modal-section">
          <h4>👨‍🍳 Пошаговое приготовление</h4>
          <ol>
            ${recipe.steps.map((s, idx) => `<li>${s}</li>`).join('')}
          </ol>
        </div>
        <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn btn-primary" id="modalPlanBtn" data-id="${recipe.id}">📅 В план</button>
          <button class="btn btn-outline btn-fav ${isFav ? 'active' : ''}" id="modalFavBtn" data-id="${recipe.id}">${isFav ? '❤️ В избранном' : '🤍 В избранное'}</button>
        </div>
      `;
      modalOverlay.classList.add('open');
      document.body.classList.add('no-scroll');

      // Обработчики внутри модалки
      document.getElementById('modalPlanBtn').addEventListener('click', function() {
        const id = parseInt(this.dataset.id);
        addToPlanner(id);
        // можно обновить модалку, чтобы отобразить состояние
        openModal(id); // перерисовка
      });
      document.getElementById('modalFavBtn').addEventListener('click', function() {
        const id = parseInt(this.dataset.id);
        toggleFavorite(id);
        openModal(id); // перерисовка
      });
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      document.body.classList.remove('no-scroll');
    }

    // Закрытие по клику на фон
    modalOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    modalClose.addEventListener('click', closeModal);
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal();
    });

    // ===== Toast-уведомления =====
    function showToast(message) {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: var(--card-bg); color: var(--text);
        padding: 14px 28px; border-radius: 40px;
        box-shadow: 0 8px 30px var(--shadow);
        border: 1px solid var(--border);
        font-size: 0.95rem;
        z-index: 2000;
        animation: fadeUp 0.3s ease;
        transition: opacity 0.5s;
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 500);
      }, 3000);
    }

    // ===== Фильтры =====
    filterBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        filterBtns.forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        renderRecipes();
      });
    });

    // ===== Поиск =====
    function performSearch() {
      searchQuery = searchInput.value.trim();
      renderRecipes();
    }
    searchBtn.addEventListener('click', performSearch);
    searchInput.addEventListener('keyup', (e) => {
      if (e.key === 'Enter') performSearch();
    });

    // ===== Тёмная тема =====
    let darkTheme = localStorage.getItem('tasty_theme') === 'dark';
    function applyTheme() {
      document.documentElement.setAttribute('data-theme', darkTheme ? 'dark' : 'light');
      themeToggle.textContent = darkTheme ? '☀️ Светлая' : '🌙 Тёмная';
      localStorage.setItem('tasty_theme', darkTheme ? 'dark' : 'light');
    }
    themeToggle.addEventListener('click', () => {
      darkTheme = !darkTheme;
      applyTheme();
    });
    applyTheme();

    // ===== Инициализация =====
    renderRecipes();
    renderPlanner();
  })();
</script>

<footer style="margin-top:32px;padding:16px 0;border-top:1px solid var(--border);text-align:center;color:var(--text-secondary);font-size:0.85rem;">
  TastyKitchen © 2026 — Готовьте с удовольствием!
</footer>
</body>
